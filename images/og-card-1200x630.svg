<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!-- Warm off-white background with subtle radial highlight -->
  <defs>
    <radialGradient id="bgGlow" cx="0.15" cy="0.2" r="0.7">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="1"/>
      <stop offset="100%" stop-color="#FEF3C7" stop-opacity="0.35"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="#FAFAF9"/>
  <rect width="1200" height="630" fill="url(#bgGlow)"/>

  <!-- Top accent bar — teal to amber, references BA CourtHouse house style -->
  <rect x="0" y="0" width="660" height="6" fill="#0F766E"/>
  <rect x="660" y="0" width="540" height="6" fill="#D97706"/>

  <!-- Mark on left, primary colors -->
  <g transform="translate(120, 155) scale(5.2)">
    <path d="M 32 46 A 20 20 0 0 1 46 16 A 20 20 0 0 1 32 46 Z" fill="#14B8A6"/>
    <path d="M 32 46 A 20 20 0 0 0 18 16 A 20 20 0 0 0 32 46 Z" fill="#0F766E"/>
    <path d="M 32 46 L 32 56" stroke="#0F766E" stroke-width="3.5" stroke-linecap="round"/>
  </g>

  <!-- Wordmark + subtag -->
  <text x="540" y="285" font-family="Poppins" font-weight="700" font-size="96" fill="#0F172A" letter-spacing="-2">ToolVine</text>
  <text x="544" y="328" font-family="Inter" font-weight="600" font-size="18" fill="#0F766E" letter-spacing="6">MENTORS INITIATIVE</text>

  <!-- Amber divider -->
  <line x1="540" y1="395" x2="900" y2="395" stroke="#D97706" stroke-width="2"/>

  <!-- Tagline -->
  <text x="540" y="460" font-family="Poppins" font-weight="500" font-size="40" fill="#0F766E">Linked Growth.</text>

  <!-- URL bottom-right -->
  <text x="1140" y="585" font-family="Inter" font-weight="500" font-size="22" fill="#64748B" text-anchor="end" letter-spacing="1">toolvinementors.com</text>
</svg>
