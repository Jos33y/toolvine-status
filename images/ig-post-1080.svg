<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" width="1080" height="1080">
  <!-- Warm off-white background -->
  <defs>
    <radialGradient id="bgGlow" cx="0.5" cy="0.2" r="0.75">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="1"/>
      <stop offset="100%" stop-color="#FEF3C7" stop-opacity="0.32"/>
    </radialGradient>
  </defs>
  <rect width="1080" height="1080" fill="#FAFAF9"/>
  <rect width="1080" height="1080" fill="url(#bgGlow)"/>

  <!-- Top accent bar — teal to amber -->
  <rect x="0" y="0" width="594" height="8" fill="#0F766E"/>
  <rect x="594" y="0" width="486" height="8" fill="#D97706"/>

  <!-- Mark, centered -->
  <g transform="translate(370, 245) scale(5.3)">
    <path d="M 32 46 A 20 20 0 0 1 46 16 A 20 20 0 0 1 32 46 Z" fill="#14B8A6"/>
    <path d="M 32 46 A 20 20 0 0 0 18 16 A 20 20 0 0 0 32 46 Z" fill="#0F766E"/>
    <path d="M 32 46 L 32 56" stroke="#0F766E" stroke-width="3.5" stroke-linecap="round"/>
  </g>

  <!-- Wordmark -->
  <text x="540" y="645" font-family="Poppins" font-weight="700" font-size="92" fill="#0F172A" text-anchor="middle" letter-spacing="-2">ToolVine</text>

  <!-- Subtag -->
  <text x="540" y="698" font-family="Inter" font-weight="600" font-size="18" fill="#0F766E" text-anchor="middle" letter-spacing="6">MENTORS INITIATIVE</text>

  <!-- Amber divider -->
  <line x1="470" y1="745" x2="610" y2="745" stroke="#D97706" stroke-width="2"/>

  <!-- Tagline -->
  <text x="540" y="820" font-family="Poppins" font-weight="500" font-size="44" fill="#0F766E" text-anchor="middle">Linked Growth.</text>

  <!-- URL footer -->
  <text x="540" y="985" font-family="Inter" font-weight="500" font-size="22" fill="#64748B" text-anchor="middle" letter-spacing="2">toolvinementors.com</text>
</svg>
